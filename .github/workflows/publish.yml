name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish n8n-nodes-learningsuite
        run: npm publish --provenance --access public
        env:
          RELEASE_MODE: 'true'

      - name: Publish n8n-nodes-learningsuiteio
        shell: bash
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"

          cp -R dist "${publish_dir}/dist"
          cp README.md LICENSE package.json "${publish_dir}/"

          npm pkg set --prefix "${publish_dir}" name="n8n-nodes-learningsuiteio"
          npm publish "${publish_dir}" --provenance --access public --ignore-scripts
        env:
          RELEASE_MODE: 'true'

      - name: Publish @rjsebening/n8n-nodes-learningsuite
        shell: bash
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"

          cp -R dist "${publish_dir}/dist"
          cp README.md LICENSE package.json "${publish_dir}/"

          npm pkg set --prefix "${publish_dir}" name="@rjsebening/n8n-nodes-learningsuite"
          npm publish "${publish_dir}" --provenance --access public --ignore-scripts
        env:
          RELEASE_MODE: 'true'

      - name: Publish @rjsebening/n8n-nodes-learningsuiteio
        shell: bash
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"

          cp -R dist "${publish_dir}/dist"
          cp README.md LICENSE package.json "${publish_dir}/"

          npm pkg set --prefix "${publish_dir}" name="@rjsebening/n8n-nodes-learningsuiteio"
          npm publish "${publish_dir}" --provenance --access public --ignore-scripts
        env:
          RELEASE_MODE: 'true'
